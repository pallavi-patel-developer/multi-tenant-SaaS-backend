services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_backend
    env_file:
      - .env
    ports:
      - "5001:5001"
    networks:
      - saas_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:5001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.25-alpine
    container_name: saas_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - saas_network
    restart: unless-stopped

networks:
  saas_network:
    driver: bridge
